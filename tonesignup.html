<!DOCTYPE html>
<html>
<head>
    <title>TONE Sign Up</title>

    <style>
        body {
            font-family: Arial;
            background-color: #aecc17;
        }

        .form {
            width: 300px;
            margin: 60px auto;
            padding: 20px;
            background-color: white;
            border: 1px solid black;
        }

        h2 {
            text-align: center;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 5px;
            background-color: aqua;
        }

        .login-btn {
            margin-top: 5px;
        }

        .note {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="form">
        <h2>Create Account</h2>

        <form action="toneonlinewebsite.html" method="GET">

            <label>Username</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Phone Number</label>
            <input type="tel" required>

            <label>Age</label>
            <input type="number" required>

            <label>Password</label>
            <input type="password" required>

            <button type="submit">Sign Up</button>
        </form>

        <form action="toneforms.html" method="GET">
            <button type="submit" class="login-btn">Back to Login</button>
        </form>

        <p class="note">Join TONE Music</p>
    </div>

</body>
</html>
